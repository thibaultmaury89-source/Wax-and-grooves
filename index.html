<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wax & Grooves - Pro Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-dark: #121212; --bg-card: #1e1e1e; --accent: #d4af37;
            --text-main: #ffffff; --text-muted: #a0a0a0; --danger: #dc3545;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding-bottom: 50px; }
        
        /* Layout Mobile */
        .tab-content { display: none; padding: 1rem; }
        .tab-content.active { display: block; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        
        /* Boutons */
        .btn { padding: 12px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; text-align: center; display: block; width: 100%; margin-bottom: 10px; }
        .btn-primary { background: var(--accent); color: #000; }
        
        /* Scanner */
        #scanner-container { width: 100%; max-width: 400px; margin: 10px auto; overflow: hidden; }
        
        nav { background: #000; padding: 1rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 0.9rem; white-space: nowrap; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="logo" style="color:var(--accent); font-weight:bold;">W&G</div>
        <div class="tabs">
            <button class="tab-btn active" onclick="app.switchTab('home')">Accueil</button>
            <button class="tab-btn" onclick="app.switchTab('collection')">Collection</button>
        </div>
    </nav>

    <!-- Contenu -->
    <div id="collection-tab" class="tab-content active">
        <button class="btn btn-primary" onclick="app.toggleScanner()">📷 Scanner Vinyle</button>
        <div id="scanner-container" style="display:none;"></div>
        
        <form id="add-form" style="margin-top: 20px;">
            <input type="text" id="f-title" placeholder="Titre de l'album" required style="margin-bottom:10px;">
            <input type="text" id="f-artist" placeholder="Artiste" required style="margin-bottom:10px;">
            <button type="submit" class="btn btn-primary">Enregistrer</button>
        </form>
    </div>

    <script>
        const app = {
            scanner: null,
            
            // Logique de scan optimisée
            async toggleScanner() {
                const container = document.getElementById('scanner-container');
                if (container.style.display === 'none') {
                    container.style.display = 'block';
                    this.scanner = new Html5Qrcode("scanner-container");
                    this.scanner.start(
                        { facingMode: "environment" }, 
                        { fps: 10, qrbox: 250 }, 
                        (decodedText) => {
                            this.scanner.stop();
                            container.style.display = 'none';
                            this.processBarcode(decodedText);
                        }
                    );
                } else {
                    this.scanner.stop();
                    container.style.display = 'none';
                }
            },

            async processBarcode(barcode) {
                // Remplacez par votre vrai Token Discogs
                const TOKEN = "VOTRE_TOKEN"; 
                console.log("Recherche de : " + barcode);
                
                try {
                    const res = await fetch(`https://api.discogs.com/database/search?barcode=${barcode}&token=${TOKEN}`);
                    const data = await res.json();
                    
                    if (data.results && data.results.length > 0) {
                        const m = data.results[0];
                        document.getElementById('f-title').value = m.title.split(' - ')[1] || m.title;
                        document.getElementById('f-artist').value = m.title.split(' - ')[0] || '';
                        alert("Vinyle trouvé : " + m.title);
                    } else {
                        alert("Aucun résultat trouvé pour ce code.");
                    }
                } catch(e) {
                    alert("Erreur réseau");
                }
            },

            switchTab(id) {
                document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
                document.getElementById(id + '-tab').style.display = 'block';
            }
        };
    </script>
</body>
</html>
