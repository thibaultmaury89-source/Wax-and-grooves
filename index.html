<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wax & Grooves - Pro Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-dark: #121212; --bg-card: #1e1e1e; --bg-lighter: #2a2a2a;
            --accent: #d4af37; --accent-hover: #b5952f;
            --text-main: #ffffff; --text-muted: #a0a0a0;
            --favorite: #ffc107; --danger: #dc3545;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; overflow-x: hidden; padding-bottom: 20px; }

        /* Animation de Démarrage */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-dark);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease-out;
        }
        .splash-vinyl {
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle, #333 4%, #111 5%, #111 20%, #222 21%, #111 22%, #111 40%, #222 41%, #111 42%, #111 100%);
            animation: spin 2s linear infinite; margin-bottom: 20px; border: 4px solid #000;
        }
        .splash-vinyl::after {
            content: ''; display: block; width: 32px; height: 32px; background: var(--accent);
            border-radius: 50%; position: relative; top: 40px; left: 40px; border: 2px solid #000;
        }

        /* Navigation (Base) */
        nav { background-color: #000; padding: 1rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.2rem; font-weight: bold; color: var(--accent); cursor: pointer; user-select: none; white-space: nowrap;}
        
        .tabs { display: flex; gap: 10px; flex: 1; justify-content: center; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 0.95rem; font-weight: bold; cursor: pointer; padding: 8px 10px; white-space: nowrap; transition: color 0.3s; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .user-menu { display: flex; align-items: center; }

        .tab-content { display: none; padding: 1.5rem 1rem; max-width: 1300px; margin: 0 auto; animation: fadeIn 0.4s ease-in-out; }
        .tab-content.active { display: block; }

        /* UI Elements Genériques */
        .btn { padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.95rem; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-full { width: 100%; margin-bottom: 10px; }
        
        input, select, textarea { width: 100%; padding: 14px 12px; background-color: var(--bg-lighter); border: 1px solid #444; color: white; border-radius: 8px; font-size: 1rem; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-section { border-bottom: 1px solid #333; padding-bottom: 5px; margin: 20px 0 15px; font-size: 0.85rem; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; }

        /* Collection & Grid */
        .filters-bar { display: flex; gap: 10px; background: var(--bg-card); padding: 15px; border-radius: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .vinyl-card { background: var(--bg-card); border-radius: 10px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #333; }
        .vinyl-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .card-content { padding: 12px; }
        .badge-fav { position: absolute; top: 8px; right: 8px; color: var(--favorite); font-size: 1.2rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); z-index: 10; }
        
        /* Modal & Dialogs */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 1000; justify-content: center; align-items: center; padding: 10px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-dark); border: 1px solid #333; border-radius: 16px; width: 100%; max-width: 600px; max-height: 95vh; overflow-y: auto; padding: 1.5rem; position: relative; }
        .modal-close { position: absolute; top: 10px; right: 15px; background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; padding: 5px; }
        
        /* Scanner */
        #scanner-container { width: 100%; overflow: hidden; border-radius: 8px; margin-top: 15px; }
        #scanner-container video { width: 100% !important; border-radius: 8px; }

        /* 📱 CORRECTION MOBILE SPÉCIFIQUE 📱 */
        @media (max-width: 768px) {
            nav { flex-direction: column; align-items: flex-start; position: relative; padding: 1rem 0.5rem 0.5rem 0.5rem; }
            .user-menu { position: absolute; top: 0.8rem; right: 0.5rem; }
            /* Les onglets prennent toute la largeur en dessous du logo et se répartissent équitablement */
            .tabs { width: 100%; margin-top: 15px; justify-content: space-between; gap: 5px; }
            .tab-btn { flex: 1; text-align: center; font-size: 0.8rem; padding: 8px 2px; }
            
            .filters-bar > * { flex: 1 1 100%; }
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .form-grid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-vinyl"></div>
        <h1 style="color: var(--accent); letter-spacing: 2px; font-size: 1.5rem;">WAX & GROOVES</h1>
    </div>

    <nav>
        <div class="logo" onclick="app.switchTab('home')">💿 W&G</div>
        <div class="user-menu">
            <button class="btn btn-primary" style="padding: 6px 10px; font-size: 0.8rem;" id="auth-btn" onclick="app.openAuthModal()">Connexion</button>
        </div>
        <div class="tabs">
            <button class="tab-btn active" data-tab="home" onclick="app.switchTab('home')">Accueil</button>
            <button class="tab-btn" data-tab="collection" onclick="app.switchTab('collection')">Collection</button>
            <button class="tab-btn" data-tab="wishlist" onclick="app.switchTab('wishlist')">Wishlist</button>
            <button class="tab-btn" data-tab="stats" onclick="app.switchTab('stats')">Stats</button>
        </div>
    </nav>

    <div id="auth-modal" class="modal">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <h2 style="color: var(--accent); margin-bottom: 10px;">Accès au Club</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 0.9rem;">Sauvegardez votre collection dans le cloud.</p>
            <input type="email" id="auth-email" placeholder="Adresse Email" style="margin-bottom: 15px;" required>
            <input type="password" id="auth-password" placeholder="Mot de passe" style="margin-bottom: 15px;" required>
            <button class="btn btn-primary btn-full" onclick="app.login()">Se Connecter</button>
            <button class="btn btn-outline btn-full" onclick="app.signup()">Créer un compte</button>
            <hr style="border-color: #333; margin: 20px 0;">
            <button class="btn" style="background: transparent; color: var(--text-muted); font-size: 0.9rem; text-decoration: underline;" onclick="app.closeModal('auth-modal')">Mode Local (Sans compte)</button>
        </div>
    </div>

    <div id="home-tab" class="tab-content active">
        <div id="hero-container"></div>
        <div class="form-grid" id="dash-summary" style="margin-top: 1.5rem;"></div>
    </div>

    <div id="collection-tab" class="tab-content">
        <div style="background: var(--bg-card); padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem;">
            <h2 style="color: var(--accent); margin-bottom: 15px;">Ajouter à la Collection</h2>
            <button class="btn btn-outline btn-full" onclick="app.toggleScanner()">📷 Scanner Code-Barres</button>
            <div id="scanner-container" style="display: none;"></div>

            <form id="add-form" style="margin-top: 15px;" onsubmit="app.addVinyl(event, false)">
                <div class="form-section">Infos Principales</div>
                <div class="form-grid">
                    <input type="text" id="f-title" placeholder="Titre de l'album" required>
                    <input type="text" id="f-artist" placeholder="Artiste" required>
                    <input type="number" id="f-year" placeholder="Année">
                    <select id="f-genre">
                        <option value="Rock">Rock</option><option value="Jazz">Jazz</option>
                        <option value="Hip-Hop">Hip-Hop</option><option value="Électronique">Électronique</option>
                        <option value="Pop">Pop</option><option value="Autre">Autre</option>
                    </select>
                </div>
                <div class="form-section">Pochette</div>
                <div class="form-grid">
                    <input type="url" id="f-image-url" placeholder="URL de l'image (optionnel)">
                </div>
                <div class="form-section">Détails Techniques</div>
                <div class="form-grid">
                    <select id="f-format"><option value="33T">33 Tours (LP)</option><option value="45T">45 Tours (EP)</option></select>
                    <input type="text" id="f-color" placeholder="Couleur (ex: Noir)">
                    <input type="number" step="0.01" id="f-price" placeholder="Prix d'achat (€)">
                </div>
                <button type="submit" class="btn btn-primary btn-full" style="margin-top: 15px;">Enregistrer le vinyle</button>
            </form>
        </div>

        <div class="filters-bar">
            <input type="text" id="search-input" placeholder="🔍 Rechercher..." oninput="app.renderGrid('collection')">
            <select id="filter-genre" onchange="app.renderGrid('collection')"><option value="all">Tous les genres</option></select>
            <select id="sort-by" onchange="app.renderGrid('collection')">
                <option value="recent">Plus récents</option>
                <option value="artist">Artiste (A-Z)</option>
            </select>
        </div>
        <div class="grid" id="collection-grid"></div>
    </div>

    <div id="wishlist-tab" class="tab-content">
        <div style="background: var(--bg-card); padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem;">
            <h2 style="color: var(--accent); margin-bottom: 15px;">Ajouter à la Wishlist</h2>
            <form id="wishlist-form" onsubmit="app.addWishlist(event)">
                <div class="form-grid">
                    <input type="text" id="w-title" placeholder="Titre de l'album" required>
                    <input type="text" id="w-artist" placeholder="Artiste" required>
                    <input type="number" step="0.01" id="w-price" placeholder="Prix espéré (€)">
                    <input type="url" id="w-image-url" placeholder="URL de la pochette">
                </div>
                <button type="submit" class="btn btn-primary btn-full" style="margin-top: 10px;">Ajouter à ma liste</button>
            </form>
        </div>
        <div class="grid" id="wishlist-grid"></div>
    </div>

    <div id="stats-tab" class="tab-content">
        <h2 style="margin-bottom: 20px;">Tableau de bord</h2>
        <div style="display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px;">
            <div style="background: var(--bg-card); padding: 15px; border-radius: 12px;"><canvas id="genreChart"></canvas></div>
        </div>
    </div>

    <div id="fiche-modal" class="modal"><div class="modal-content" id="fiche-content"></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAQcKe_Bnvh8Y1Py3VDORx5-jiqF998XX0",
            authDomain: "wax-et-grooves.firebaseapp.com",
            projectId: "wax-et-grooves",
            storageBucket: "wax-et-grooves.firebasestorage.app",
            messagingSenderId: "739373570096",
            appId: "1:739373570096:web:91bea0d625325c6116f5f5",
            measurementId: "G-Q6GX4GFPRS"
        };

        let auth, db;
        let isFirebaseActive = false;
        try {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
            isFirebaseActive = true;
        } catch (e) {
            console.log("Mode local activé.");
        }

        const app = {
            data: [], currentTab: 'home', scanner: null, user: null, charts: {},
            DISCOGS_TOKEN: "VOTRE_TOKEN_DISCOGS_ICI", 

            init() {
                setTimeout(() => {
                    document.getElementById('splash-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500);
                    
                    if(isFirebaseActive) {
                        auth.onAuthStateChanged(user => {
                            if (user) { this.user = user; document.getElementById('auth-btn').innerText = "Déconnexion"; document.getElementById('auth-btn').onclick = () => auth.signOut(); this.syncFromFirebase(); } 
                            else { this.user = null; document.getElementById('auth-btn').innerText = "Connexion"; document.getElementById('auth-btn').onclick = () => this.openAuthModal(); this.loadLocalData(); this.openAuthModal(); }
                        });
                    } else { this.loadLocalData(); this.openAuthModal(); }
                }, 1000);
            },

            openAuthModal() { document.getElementById('auth-modal').classList.add('active'); },
            closeModal(id) { document.getElementById(id).classList.remove('active'); },
            
            async login() {
                const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
                if(e && p) { try { await auth.signInWithEmailAndPassword(e, p); this.closeModal('auth-modal'); } catch(err) { alert(err.message); } }
            },
            async signup() {
                const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
                if(e && p) { try { await auth.createUserWithEmailAndPassword(e, p); this.closeModal('auth-modal'); } catch(err) { alert(err.message); } }
            },

            loadLocalData() { this.data = JSON.parse(localStorage.getItem('wg_pro_data') || '[]'); this.refreshUI(); },
            async syncFromFirebase() { try { const doc = await db.collection('collections').doc(this.user.uid).get(); if(doc.exists) this.data = doc.data().vinyls || []; this.refreshUI(); } catch(e) {} },
            async syncToFirebase() { try { if(this.user) await db.collection('collections').doc(this.user.uid).set({ vinyls: this.data }); } catch(e) {} },
            saveData() { localStorage.setItem('wg_pro_data', JSON.stringify(this.data)); this.syncToFirebase(); this.refreshUI(); },

            refreshUI() {
                if (this.currentTab === 'home') this.renderHome();
                if (this.currentTab === 'collection') this.renderGrid('collection');
                if (this.currentTab === 'wishlist') this.renderGrid('wishlist');
                if (this.currentTab === 'stats') this.renderStats();
            },

            switchTab(tabId) {
                this.currentTab = tabId;
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`${tabId}-tab`).classList.add('active');
                document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
                this.refreshUI();
            },

            // --- SCANNER OPTIMISÉ POUR CODE BARRES ---
            toggleScanner() {
                const container = document.getElementById('scanner-container');
                if (container.style.display === 'none' || container.style.display === '') {
                    container.style.display = 'block';
                    this.scanner = new Html5Qrcode("scanner-container");
                    
                    // OPTIMISATION 1 : Ciblage spécifique des formats EAN/UPC et augmentation des FPS (30)
                    const config = { 
                        fps: 30, 
                        qrbox: { width: 250, height: 100 }, 
                        aspectRatio: 1.0,
                        formatsToSupport: [ Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.UPC_A, Html5QrcodeSupportedFormats.EAN_8 ]
                    };
                    
                    this.scanner.start({ facingMode: "environment" }, config, (decodedText) => {
                        this.scanner.stop();
                        container.style.display = 'none';
                        this.processBarcode(decodedText);
                    }).catch(err => {
                        alert("Veuillez autoriser l'accès à la caméra de votre téléphone.");
                        container.style.display = 'none';
                    });
                } else {
                    if(this.scanner) this.scanner.stop();
                    container.style.display = 'none';
                }
            },

            // --- RECHERCHE MULTI-BASES DE DONNÉES (Cascade) ---
            async processBarcode(barcode) {
                alert(`Recherche du code ${barcode} dans les bases de données...`);
                
                // 1. DISCOGS (Idéal pour les vinyles)
                try {
                    const res = await fetch(`https://api.discogs.com/database/search?barcode=${barcode}&token=${this.DISCOGS_TOKEN}`);
                    const data = await res.json();
                    if (data.results && data.results.length > 0) {
                        const m = data.results[0];
                        document.getElementById('f-title').value = m.title.split(' - ')[1] || m.title;
                        document.getElementById('f-artist').value = m.title.split(' - ')[0] || '';
                        document.getElementById('f-year').value = m.year || '';
                        document.getElementById('f-image-url').value = m.cover_image || '';
                        alert("✅ Trouvé sur Discogs !");
                        return;
                    }
                } catch(e) { console.log("Échec Discogs"); }

                // 2. MUSICBRAINZ (Base musicale open-source)
                try {
                    const mbRes = await fetch(`https://musicbrainz.org/ws/2/release/?query=barcode:${barcode}&fmt=json`);
                    const mbData = await mbRes.json();
                    if (mbData.releases && mbData.releases.length > 0) {
                        const m = mbData.releases[0];
                        document.getElementById('f-title').value = m.title;
                        document.getElementById('f-artist').value = m['artist-credit'] ? m['artist-credit'][0].name : '';
                        document.getElementById('f-year').value = m.date ? m.date.substring(0, 4) : '';
                        document.getElementById('f-image-url').value = `https://coverartarchive.org/release/${m.id}/front`;
                        alert("✅ Trouvé sur MusicBrainz !");
                        return;
                    }
                } catch(e) { console.log("Échec MusicBrainz"); }

                // 3. APPLE MUSIC / iTUNES API (Nouvelle Base - Excellent pour les vinyles récents)
                try {
                    const itunesRes = await fetch(`https://itunes.apple.com/search?term=${barcode}&entity=album&limit=1`);
                    const itunesData = await itunesRes.json();
                    if (itunesData.results && itunesData.results.length > 0) {
                        const m = itunesData.results[0];
                        document.getElementById('f-title').value = m.collectionName;
                        document.getElementById('f-artist').value = m.artistName;
                        document.getElementById('f-year').value = m.releaseDate ? m.releaseDate.substring(0, 4) : '';
                        document.getElementById('f-image-url').value = m.artworkUrl100 ? m.artworkUrl100.replace('100x100bb', '600x600bb') : '';
                        alert("✅ Trouvé via Apple Music !");
                        return;
                    }
                } catch(e) { console.log("Échec Apple Music"); }
                
                alert("❌ Album introuvable. Veuillez saisir les informations manuellement.");
            },

            // --- FONCTIONNALITÉS AFFICHAGE ---
            renderHome() {
                const owned = this.data.filter(v => !v.isWishlist);
                document.getElementById('dash-summary').innerHTML = `
                    <div style="background:var(--bg-card); padding:1.5rem; text-align:center; border-radius:12px;"><h3>Vinyles</h3><p style="font-size:1.8rem; color:var(--accent); font-weight:bold;">${owned.length}</p></div>
                    <div style="background:var(--bg-card); padding:1.5rem; text-align:center; border-radius:12px;"><h3>Valeur</h3><p style="font-size:1.8rem; color:#4caf50; font-weight:bold;">${owned.reduce((sum, v) => sum + (parseFloat(v.price) || 0), 0).toFixed(2)}€</p></div>
                `;
            },

            renderGrid(type) {
                const grid = document.getElementById(type === 'wishlist' ? 'wishlist-grid' : 'collection-grid');
                let items = this.data.filter(v => type === 'wishlist' ? v.isWishlist : !v.isWishlist);
                
                if (type === 'collection') {
                    const search = document.getElementById('search-input').value.toLowerCase();
                    items = items.filter(v => (v.title.toLowerCase().includes(search) || v.artist.toLowerCase().includes(search)));
                }

                grid.innerHTML = items.length === 0 ? `<p style="padding: 2rem; color: var(--text-muted);">Aucun disque trouvé.</p>` : items.map(v => `
                    <div class="vinyl-card" onclick="app.openFiche(${v.id})">
                        <img src="${v.image || 'https://via.placeholder.com/300x300?text=Vinyle'}">
                        <div class="card-content">
                            <div style="font-weight: bold; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${v.title}</div>
                            <div style="color: var(--accent); font-size: 0.85rem;">${v.artist}</div>
                        </div>
                    </div>
                `).join('');
            },

            addVinyl(e) {
                e.preventDefault();
                this.data.push({ id: Date.now(), title: document.getElementById('f-title').value, artist: document.getElementById('f-artist').value, year: document.getElementById('f-year').value, genre: document.getElementById('f-genre').value, image: document.getElementById('f-image-url').value, format: document.getElementById('f-format').value, color: document.getElementById('f-color').value, price: document.getElementById('f-price').value, isWishlist: false });
                this.saveData(); e.target.reset(); alert("Ajouté !");
            },

            addWishlist(e) {
                e.preventDefault();
                this.data.push({ id: Date.now(), title: document.getElementById('w-title').value, artist: document.getElementById('w-artist').value, price: document.getElementById('w-price').value, image: document.getElementById('w-image-url').value, isWishlist: true });
                this.saveData(); e.target.reset(); alert("Ajouté à la wishlist !");
            },

            openFiche(id) {
                const v = this.data.find(x => x.id === id);
                document.getElementById('fiche-content').innerHTML = `
                    <button class="modal-close" onclick="app.closeModal('fiche-modal')">✕</button>
                    <div style="text-align: center;">
                        <img src="${v.image || 'https://via.placeholder.com/300'}" style="width: 100%; max-width: 250px; border-radius: 8px;">
                        <h2 style="margin-top:10px;">${v.title}</h2><h3 style="color: var(--accent); margin-bottom:15px;">${v.artist}</h3>
                        <button class="btn" style="background: var(--danger); color: white; width:100%; margin-top:20px;" onclick="app.deleteItem(${id})">Supprimer l'album</button>
                    </div>`;
                document.getElementById('fiche-modal').classList.add('active');
            },

            deleteItem(id) { if(confirm("Supprimer cet album ?")) { this.data = this.data.filter(x => x.id !== id); this.saveData(); this.closeModal('fiche-modal'); } },

            renderStats() {
                const owned = this.data.filter(v => !v.isWishlist);
                if(owned.length === 0) return;
                const genres = {}; owned.forEach(v => { if(v.genre) genres[v.genre] = (genres[v.genre] || 0) + 1; });
                if(this.charts['genreChart']) this.charts['genreChart'].destroy();
                this.charts['genreChart'] = new Chart(document.getElementById('genreChart').getContext('2d'), { type: 'pie', data: { labels: Object.keys(genres), datasets: [{ data: Object.values(genres), backgroundColor: ['#d4af37', '#ef5466', '#1DB954', '#555', '#a0a0a0'] }] }, options: { plugins: { legend: { labels: { color: '#fff' } } } } });
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
