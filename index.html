<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wax & Grooves - Pro Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-dark: #121212; --bg-card: #1e1e1e; --bg-lighter: #2a2a2a;
            --accent: #d4af37; --accent-hover: #b5952f;
            --text-main: #ffffff; --text-muted: #a0a0a0;
            --yt-color: #ff0000; --dz-color: #ef5466; --sp-color: #1DB954; --ap-color: #fa243c;
            --favorite: #ffc107; --danger: #dc3545;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; overflow-x: hidden; padding-bottom: 20px; }

        /* Animation de Démarrage */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-dark);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease-out;
        }
        .splash-vinyl {
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle, #333 4%, #111 5%, #111 20%, #222 21%, #111 22%, #111 40%, #222 41%, #111 42%, #111 100%);
            animation: spin 2s linear infinite; margin-bottom: 20px; border: 4px solid #000;
        }
        .splash-vinyl::after {
            content: ''; display: block; width: 32px; height: 32px; background: var(--accent);
            border-radius: 50%; position: relative; top: 40px; left: 40px; border: 2px solid #000;
        }

        /* Navigation Optimisée Mobile */
        nav {
            background-color: #000; padding: 1rem; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 10px;
        }
        .logo { font-size: 1.2rem; font-weight: bold; color: var(--accent); cursor: pointer; user-select: none; white-space: nowrap;}
        
        .tabs { 
            display: flex; gap: 10px; overflow-x: auto; flex: 1; padding-bottom: 5px; 
            /* Cache la scrollbar mais permet le scroll tactile */
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        
        .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 0.95rem; font-weight: bold; cursor: pointer; padding: 8px 5px; white-space: nowrap; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .user-menu { display: flex; align-items: center; gap: 10px; }

        .tab-content { display: none; padding: 1.5rem 1rem; max-width: 1300px; margin: 0 auto; animation: fadeIn 0.4s ease-in-out; }
        .tab-content.active { display: block; }

        /* UI Elements Genériques */
        .btn { padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; text-decoration: none; justify-content: center; font-size: 0.95rem; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-full { width: 100%; margin-bottom: 10px; }
        
        input, select, textarea { width: 100%; padding: 14px 12px; background-color: var(--bg-lighter); border: 1px solid #444; color: white; border-radius: 8px; font-size: 1rem; /* 1rem évite le zoom sur iOS */ }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-section { border-bottom: 1px solid #333; padding-bottom: 5px; margin: 20px 0 15px; font-size: 0.85rem; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; }

        /* Accueil */
        .hero-vinyl { background: linear-gradient(145deg, #2a2a2a, #1a1a1a); border-radius: 16px; padding: 2rem; display: flex; gap: 2rem; align-items: center; flex-wrap: wrap; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .cover-wrapper { position: relative; width: 100%; max-width: 300px; aspect-ratio: 1; margin: 0 auto; }
        .hero-cover { width: 100%; height: 100%; border-radius: 8px; box-shadow: 5px 10px 20px rgba(0,0,0,0.5); object-fit: cover; }
        .hero-info h1 { font-size: 2rem; margin: 10px 0; line-height: 1.2; }
        
        .dashboard-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: 1.5rem; }
        .stat-card { background: var(--bg-card); padding: 1.5rem 1rem; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-card h3 { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        .stat-card p { font-size: 1.8rem; font-weight: bold; color: var(--accent); margin-top: 5px; }

        /* Collection Grid & Cards */
        .filters-bar { display: flex; gap: 10px; background: var(--bg-card); padding: 15px; border-radius: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .filters-bar > * { flex: 1 1 100%; } /* Sur mobile, chaque filtre prend toute la largeur */
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .vinyl-card { background: var(--bg-card); border-radius: 10px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #333; }
        .vinyl-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .card-content { padding: 12px; }
        .badge-fav { position: absolute; top: 8px; right: 8px; color: var(--favorite); font-size: 1.2rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); z-index: 10; }
        
        /* Modal & Dialogs */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 1000; justify-content: center; align-items: center; padding: 10px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-dark); border: 1px solid #333; border-radius: 16px; width: 100%; max-width: 600px; max-height: 95vh; overflow-y: auto; padding: 1.5rem; position: relative; }
        .modal-close { position: absolute; top: 10px; right: 15px; background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; padding: 5px; }
        
        .auth-box { max-width: 400px; margin: auto; text-align: center; }
        .auth-box input { margin-bottom: 15px; }
        
        /* File Upload & Scanner */
        .file-upload { display: flex; align-items: center; gap: 10px; background: var(--bg-lighter); padding: 10px; border-radius: 8px; border: 1px dashed #444; }
        .img-preview { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; display: none; }
        #scanner-container { width: 100%; overflow: hidden; border-radius: 8px; margin-top: 15px; }
        #scanner-container video { width: 100% !important; border-radius: 8px; } /* Force la vidéo à s'adapter à l'écran */

        .star-rating { color: #555; font-size: 1.8rem; cursor: pointer; display: flex; justify-content: center; gap: 5px; }
        .star-rating .star.active { color: var(--accent); }

        /* Media Queries pour Tablettes et PCs */
        @media (min-width: 768px) {
            .filters-bar > * { flex: 1; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .hero-vinyl { flex-wrap: nowrap; padding: 3rem; }
            .modal-content { padding: 2.5rem; }
            .form-grid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-vinyl"></div>
        <h1 style="color: var(--accent); letter-spacing: 2px; font-size: 1.5rem;">WAX & GROOVES</h1>
    </div>

    <nav>
        <div class="logo" onclick="app.switchTab('home')">💿 W&G</div>
        <div class="tabs">
            <button class="tab-btn active" data-tab="home" onclick="app.switchTab('home')">Accueil</button>
            <button class="tab-btn" data-tab="collection" onclick="app.switchTab('collection')">Collection</button>
            <button class="tab-btn" data-tab="wishlist" onclick="app.switchTab('wishlist')">Wishlist</button>
            <button class="tab-btn" data-tab="stats" onclick="app.switchTab('stats')">Stats</button>
        </div>
        <div class="user-menu">
            <button class="btn btn-primary" style="padding: 8px 12px; font-size: 0.85rem;" id="auth-btn" onclick="app.openAuthModal()">Connexion</button>
        </div>
    </nav>

    <div id="auth-modal" class="modal">
        <div class="modal-content auth-box">
            <h2 style="color: var(--accent); margin-bottom: 10px;">Accès au Club</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 0.9rem;">Sauvegardez votre collection dans le cloud.</p>
            
            <input type="email" id="auth-email" placeholder="Adresse Email" required>
            <input type="password" id="auth-password" placeholder="Mot de passe" required>
            
            <button class="btn btn-primary btn-full" onclick="app.login()">Se Connecter</button>
            <button class="btn btn-outline btn-full" onclick="app.signup()">Créer un compte</button>
            
            <hr style="border-color: #333; margin: 20px 0;">
            <button class="btn" style="background: transparent; color: var(--text-muted); font-size: 0.9rem; text-decoration: underline;" onclick="app.closeModal('auth-modal')">Mode Local (Sans compte)</button>
        </div>
    </div>

    <div id="home-tab" class="tab-content active">
        <div id="hero-container"></div>
        <div class="dashboard-summary" id="dash-summary"></div>
    </div>

    <div id="collection-tab" class="tab-content">
        <div style="background: var(--bg-card); padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem;">
            <h2 style="color: var(--accent); margin-bottom: 15px;">Ajouter à la Collection</h2>
            
            <button class="btn btn-outline btn-full" onclick="app.toggleScanner()">📷 Scanner Code-Barres</button>
            <button class="btn btn-outline btn-full" onclick="app.triggerCoverCamera()">📸 Prendre Photo Pochette</button>
            <button class="btn btn-outline btn-full" onclick="app.searchDiscogsPrompt()">🔍 Recherche Manuelle Discogs</button>
            
            <input type="file" id="cover-camera-capture" accept="image/*" capture="environment" style="display: none;" onchange="app.processCoverPhoto(this)">
            <div id="scanner-container" style="display: none;"></div>

            <form id="add-form" style="margin-top: 15px;" onsubmit="app.addVinyl(event, false)">
                <div class="form-section">Infos Principales</div>
                <div class="form-grid">
                    <input type="text" id="f-title" placeholder="Titre de l'album" required>
                    <input type="text" id="f-artist" placeholder="Artiste" required>
                    <input type="number" id="f-year" placeholder="Année">
                    <select id="f-genre">
                        <option value="Rock">Rock</option><option value="Jazz">Jazz</option>
                        <option value="Hip-Hop">Hip-Hop</option><option value="Électronique">Électronique</option>
                        <option value="Soul/Funk">Soul/Funk</option><option value="Pop">Pop</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>

                <div class="form-section">Pochette</div>
                <div class="form-grid">
                    <div class="file-upload">
                        <input type="file" id="f-file" accept="image/*" onchange="app.previewImage(this, 'f-preview')">
                        <img id="f-preview" class="img-preview" src="">
                    </div>
                    <input type="url" id="f-image-url" placeholder="URL de l'image (optionnel)">
                </div>

                <div class="form-section">Détails Techniques</div>
                <div class="form-grid">
                    <select id="f-format"><option value="33T">33 Tours (LP)</option><option value="45T">45 Tours (EP/Single)</option></select>
                    <input type="text" id="f-color" placeholder="Couleur (ex: Noir)">
                    <input type="number" step="0.01" id="f-price" placeholder="Prix d'achat (€)">
                </div>

                <button type="submit" class="btn btn-primary btn-full" style="margin-top: 15px;">Enregistrer le vinyle</button>
            </form>
        </div>

        <div class="filters-bar">
            <input type="text" id="search-input" placeholder="🔍 Rechercher (Titre, Artiste)..." oninput="app.renderGrid('collection')">
            <select id="filter-genre" onchange="app.renderGrid('collection')"><option value="all">Tous les genres</option></select>
            <select id="sort-by" onchange="app.renderGrid('collection')">
                <option value="recent">Plus récents</option>
                <option value="artist">Artiste (A-Z)</option>
                <option value="year">Année (Récent > Ancien)</option>
            </select>
            <button class="btn btn-outline" onclick="app.toggleFavoritesFilter()" id="btn-fav-filter">⭐ Favoris</button>
        </div>

        <div class="grid" id="collection-grid"></div>
    </div>

    <div id="wishlist-tab" class="tab-content">
        <div style="background: var(--bg-card); padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem;">
            <h2 style="color: var(--accent); margin-bottom: 15px;">Ajouter à la Wishlist</h2>
            <form id="wishlist-form" onsubmit="app.addWishlist(event)">
                <div class="form-grid">
                    <input type="text" id="w-title" placeholder="Titre de l'album" required>
                    <input type="text" id="w-artist" placeholder="Artiste" required>
                    <input type="number" step="0.01" id="w-price" placeholder="Prix espéré (€)">
                    <input type="url" id="w-image-url" placeholder="URL de la pochette">
                    <input type="text" id="w-store" placeholder="Lien boutique">
                </div>
                <button type="submit" class="btn btn-primary btn-full" style="margin-top: 10px;">Ajouter à ma liste</button>
            </form>
        </div>
        <div class="grid" id="wishlist-grid"></div>
    </div>

    <div id="stats-tab" class="tab-content">
        <h2 style="margin-bottom: 20px;">Tableau de bord</h2>
        <button class="btn btn-outline btn-full" onclick="app.exportCSV()">📥 Exporter la collection (CSV)</button>
        <div style="display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px;">
            <div style="background: var(--bg-card); padding: 15px; border-radius: 12px;"><canvas id="genreChart"></canvas></div>
            <div style="background: var(--bg-card); padding: 15px; border-radius: 12px;"><canvas id="decadeChart"></canvas></div>
        </div>
    </div>

    <div id="fiche-modal" class="modal">
        <div class="modal-content" id="fiche-content"></div>
    </div>

    <div id="confirm-modal" class="modal" style="z-index: 10000;">
        <div style="background: var(--bg-card); padding: 2rem; border-radius: 12px; text-align: center; width: 90%; max-width: 350px; border: 1px solid #333;">
            <h3 id="confirm-msg" style="margin-bottom: 20px; font-size: 1.1rem;"></h3>
            <div style="display: flex; gap: 10px; flex-direction: column;">
                <button class="btn btn-primary" style="background: var(--danger); color: white;" onclick="app.resolveConfirm(true)">Oui, Supprimer</button>
                <button class="btn btn-outline" onclick="app.resolveConfirm(false)">Annuler</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAQcKe_Bnvh8Y1Py3VDORx5-jiqF998XX0",
            authDomain: "wax-et-grooves.firebaseapp.com",
            projectId: "wax-et-grooves",
            storageBucket: "wax-et-grooves.firebasestorage.app",
            messagingSenderId: "739373570096",
            appId: "1:739373570096:web:91bea0d625325c6116f5f5",
            measurementId: "G-Q6GX4GFPRS"
        };

        let auth, db;
        let isFirebaseActive = false;
        try {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
            isFirebaseActive = true;
        } catch (e) {
            console.log("Mode local activé.");
        }

        const app = {
            data: [],
            currentTab: 'home',
            showOnlyFavorites: false,
            scanner: null,
            confirmCallback: null,
            charts: {},
            user: null,
            DISCOGS_TOKEN: "VOTRE_TOKEN_DISCOGS_ICI", // <-- À remplir pour activer Discogs
            cache: {},
            pendingResults: [],
            currentBarcode: '',
            lastSelectedMetadata: null,

            init() {
                this.cache = JSON.parse(localStorage.getItem('wg_search_cache')) || {};
                setTimeout(() => {
                    document.getElementById('splash-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500);
                    
                    if(isFirebaseActive) {
                        auth.onAuthStateChanged(user => {
                            if (user) {
                                this.user = user;
                                document.getElementById('auth-btn').innerText = "Déconnexion";
                                document.getElementById('auth-btn').onclick = () => auth.signOut();
                                this.syncFromFirebase();
                            } else {
                                this.user = null;
                                document.getElementById('auth-btn').innerText = "Connexion";
                                document.getElementById('auth-btn').onclick = () => this.openAuthModal();
                                this.loadLocalData();
                                this.openAuthModal(); 
                            }
                        });
                    } else {
                        this.loadLocalData();
                        this.openAuthModal();
                    }
                }, 1000);
            },

            // --- AUTHENTIFICATION ---
            openAuthModal() { document.getElementById('auth-modal').classList.add('active'); },
            closeModal(id) { document.getElementById(id).classList.remove('active'); },
            
            async login() {
                const email = document.getElementById('auth-email').value;
                const pass = document.getElementById('auth-password').value;
                if(!email || !pass) return alert("Remplissez tous les champs.");
                try {
                    await auth.signInWithEmailAndPassword(email, pass);
                    this.closeModal('auth-modal');
                } catch (e) { alert("Erreur : " + e.message); }
            },
            
            async signup() {
                const email = document.getElementById('auth-email').value;
                const pass = document.getElementById('auth-password').value;
                if(!email || !pass) return alert("Remplissez tous les champs.");
                try {
                    await auth.createUserWithEmailAndPassword(email, pass);
                    this.closeModal('auth-modal');
                } catch (e) { alert("Erreur : " + e.message); }
            },

            // --- DONNÉES ---
            loadLocalData() {
                const stored = localStorage.getItem('wg_pro_data');
                this.data = stored ? JSON.parse(stored) : [];
                this.refreshUI();
            },
            
            async syncFromFirebase() {
                if(!this.user) return;
                try {
                    const doc = await db.collection('collections').doc(this.user.uid).get();
                    if(doc.exists) {
                        this.data = doc.data().vinyls || [];
                    } else {
                        this.syncToFirebase();
                    }
                    this.refreshUI();
                } catch(e) { console.error("Erreur sync base de données", e); }
            },

            async syncToFirebase() {
                if(!this.user) return;
                try {
                    await db.collection('collections').doc(this.user.uid).set({ vinyls: this.data });
                } catch(e) { console.error("Erreur sauvegarde cloud", e); }
            },

            saveData() {
                localStorage.setItem('wg_pro_data', JSON.stringify(this.data));
                if(this.user && isFirebaseActive) this.syncToFirebase();
                this.refreshUI();
            },

            refreshUI() {
                this.updateFilters();
                if (this.currentTab === 'home') this.renderHome();
                if (this.currentTab === 'collection') this.renderGrid('collection');
                if (this.currentTab === 'wishlist') this.renderGrid('wishlist');
                if (this.currentTab === 'stats') this.renderStats();
            },

            switchTab(tabId) {
                this.currentTab = tabId;
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`${tabId}-tab`).classList.add('active');
                document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
                this.refreshUI();
            },

            // --- SCANNER ET RECHERCHE OPTIMISÉE ---
            toggleScanner() {
                const container = document.getElementById('scanner-container');
                if (container.style.display === 'none' || container.style.display === '') {
                    container.style.display = 'block';
                    
                    let formats = [];
                    if (window.Html5QrcodeSupportedFormats) {
                        formats = [
                            Html5QrcodeSupportedFormats.EAN_13,
                            Html5QrcodeSupportedFormats.EAN_8,
                            Html5QrcodeSupportedFormats.UPC_A,
                            Html5QrcodeSupportedFormats.UPC_E,
                            Html5QrcodeSupportedFormats.CODE_128
                        ];
                    }
                    
                    this.scanner = new Html5Qrcode("scanner-container", { formatsToSupport: formats });
                    const config = { fps: 25, qrbox: (w, h) => ({ width: Math.min(w * 0.85, 320), height: 140 }), aspectRatio: 1.0 };
                    
                    this.scanner.start({ facingMode: "environment" }, config, (decodedText) => {
                        this.scanner.stop().then(() => {
                            container.style.display = 'none';
                            this.processBarcode(decodedText);
                        }).catch(() => {
                            container.style.display = 'none';
                            this.processBarcode(decodedText);
                        });
                    }).catch(err => {
                        alert("Veuillez autoriser l'accès à la caméra.");
                        container.style.display = 'none';
                    });
                } else {
                    if(this.scanner) {
                        this.scanner.stop().then(() => { container.style.display = 'none'; }).catch(() => { container.style.display = 'none'; });
                    } else {
                        container.style.display = 'none';
                    }
                }
            },

            // Déclencheur caméra natif pour photo de pochette
            triggerCoverCamera() {
                document.getElementById('cover-camera-capture').click();
            },

            // Traitement de l'image de la pochette capturée par l'appareil photo
            processCoverPhoto(input) {
                if (input.files && input.files[0]) {
                    const file = input.files[0];
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        document.getElementById('f-preview').src = e.target.result;
                        document.getElementById('f-preview').style.display = 'block';
                        
                        // Extraction intelligente du nom de fichier pour assister la recherche textuelle
                        const cleanName = file.name.replace(/\.[^/.]+$/, "").replace(/[-_]/g, " ");
                        const keywords = prompt("Analyse de la photo... Pour compléter automatiquement la fiche produit, veuillez confirmer ou ajuster les mots-clés de l'album (Artiste, Titre) :", cleanName !== "image" ? cleanName : "");
                        if (keywords) {
                            this.searchDiscogsPromptWithText(keywords);
                        }
                    };
                    reader.readAsDataURL(file);
                }
            },

            async processBarcode(barcode) {
                if (!barcode) return;
                const cleanBarcode = barcode.trim();
                this.currentBarcode = cleanBarcode;

                // 1. Gestion immédiate des doublons locaux
                const existing = this.data.find(v => v.barcode === cleanBarcode && !v.isWishlist);
                if (existing) {
                    alert("Ce vinyle est déjà présent dans votre collection ! Ouverture de la fiche...");
                    this.openFiche(existing.id);
                    return;
                }

                // 2. Recherche mémoire locale (Cache historique)
                if (this.cache[cleanBarcode]) {
                    this.pendingResults = this.cache[cleanBarcode];
                    this.showEditionSelection();
                    return;
                }

                alert("Code-barres détecté : " + cleanBarcode + ". Recherche...");
                let results = [];

                // API Discogs (Prioritaire - Recherche Stricte)
                if (this.DISCOGS_TOKEN && this.DISCOGS_TOKEN !== "VOTRE_TOKEN_DISCOGS_ICI") {
                    try {
                        const res = await fetch(`https://api.discogs.com/database/search?barcode=${cleanBarcode}&token=${this.DISCOGS_TOKEN}`);
                        const data = await res.json();
                        if (data.results && data.results.length > 0) {
                            data.results.forEach(m => {
                                const parts = m.title.split(' - ');
                                results.push({
                                    title: parts[1] || m.title, artist: parts[0] || '', year: m.year || '', image: m.cover_image || '',
                                    genre: m.genre ? m.genre[0] : 'Autre', format: (m.format && (m.format.includes('LP') || m.format.includes('33'))) ? '33T' : '45T',
                                    label: m.label || [], country: m.country || '', notes: `Édition : ${m.country || 'Inconnue'} (${m.year || 'N/C'}). Label : ${m.label ? m.label.join(', ') : 'N/C'}.`
                                });
                            });
                        }
                    } catch(e) {}
                }

                // Fallback Discogs (Recherche élargie par mot-clé général si le champ strict barcode échoue)
                if (results.length === 0 && this.DISCOGS_TOKEN && this.DISCOGS_TOKEN !== "VOTRE_TOKEN_DISCOGS_ICI") {
                    try {
                        const res = await fetch(`https://api.discogs.com/database/search?q=${cleanBarcode}&token=${this.DISCOGS_TOKEN}`);
                        const data = await res.json();
                        if (data.results && data.results.length > 0) {
                            data.results.slice(0, 5).forEach(m => {
                                const parts = m.title.split(' - ');
                                results.push({
                                    title: parts[1] || m.title, artist: parts[0] || '', year: m.year || '', image: m.cover_image || '',
                                    genre: m.genre ? m.genre[0] : 'Autre', format: (m.format && (m.format.includes('LP') || m.format.includes('33'))) ? '33T' : '45T',
                                    label: m.label || [], country: m.country || '', notes: `Trouvé via indexation secondaire de code.`
                                });
                            });
                        }
                    } catch(e) {}
                }

                // API MusicBrainz (Complément)
                try {
                    const mbRes = await fetch(`https://musicbrainz.org/ws/2/release/?query=barcode:${cleanBarcode}&fmt=json`);
                    const mbData = await mbRes.json();
                    if (mbData.releases && mbData.releases.length > 0) {
                        mbData.releases.forEach(m => {
                            results.push({
                                title: m.title, artist: m['artist-credit'] ? m['artist-credit'][0].name : '', year: m.date ? m.date.split('-')[0] : '',
                                image: `https://coverartarchive.org/release/${m.id}/front`, genre: 'Autre', format: '33T',
                                label: m['label-info'] ? m['label-info'].map(l => l.label ? l.label.name : '') : [], country: m.country || '',
                                notes: `Source : MusicBrainz. Édition : ${m.country || 'Inconnue'}.`
                            });
                        });
                    }
                } catch(e) {}

                if (results.length > 0) {
                    this.cache[cleanBarcode] = results;
                    localStorage.setItem('wg_search_cache', JSON.stringify(this.cache));
                    
                    this.pendingResults = results;
                    this.showEditionSelection();
                } else {
                    alert("Album introuvable automatiquement. Veuillez utiliser la recherche textuelle ou remplir le formulaire.");
                }
            },

            showEditionSelection() {
                if (!this.pendingResults || this.pendingResults.length === 0) return;
                
                if (this.pendingResults.length === 1) {
                    this.selectEdition(0);
                    return;
                }

                let content = `
                    <button class="modal-close" onclick="app.closeModal('fiche-modal')">✕</button>
                    <h2 style="color: var(--accent); margin-bottom: 15px; font-size: 1.3rem;">Choisir l'édition correspondante</h2>
                    <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 15px;">Plusieurs correspondances trouvées. Sélectionnez le bon vinyle :</p>
                    <div style="display: flex; flex-direction: column; gap: 12px; max-height: 60vh; overflow-y: auto; padding-right: 5px;">
                `;

                this.pendingResults.forEach((res, idx) => {
                    content += `
                        <div style="background: var(--bg-card); border: 1px solid #333; border-radius: 8px; padding: 10px; display: flex; gap: 12px; align-items: center; cursor: pointer; transition: 0.2s;" 
                             onclick="app.selectEdition(${idx})" 
                             onmouseenter="this.style.borderColor='var(--accent)'" 
                             onmouseleave="this.style.borderColor='#333'">
                            <img src="${res.image || 'https://via.placeholder.com/60?text=No+Cover'}" style="width: 55px; height: 55px; object-fit: cover; border-radius: 4px;" onerror="this.src='https://via.placeholder.com/60?text=No+Cover'">
                            <div style="flex: 1; min-width: 0; text-align: left;">
                                <div style="font-weight: bold; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white;">${res.title}</div>
                                <div style="color: var(--accent); font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${res.artist}</div>
                                <div style="color: var(--text-muted); font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                    ${res.year ? res.year : 'Année inconnue'} | ${res.country ? res.country : 'Pays inconnu'}
                                </div>
                            </div>
                        </div>
                    `;
                });

                content += `</div>`;
                document.getElementById('fiche-content').innerHTML = content;
                document.getElementById('fiche-modal').classList.add('active');
            },

            selectEdition(index) {
                const res = this.pendingResults[index];
                if (!res) return;

                document.getElementById('f-title').value = res.title || '';
                document.getElementById('f-artist').value = res.artist || '';
                document.getElementById('f-year').value = res.year || '';
                
                const genreSelect = document.getElementById('f-genre');
                let matched = false;
                for (let i = 0; i < genreSelect.options.length; i++) {
                    if (res.genre && res.genre.toLowerCase().includes(genreSelect.options[i].value.toLowerCase())) {
                        genreSelect.selectedIndex = i;
                        matched = true;
                        break;
                    }
                }
                if (!matched) genreSelect.value = 'Autre';

                document.getElementById('f-image-url').value = res.image || '';
                if(res.image) {
                    document.getElementById('f-preview').src = res.image;
                    document.getElementById('f-preview').style.display = 'block';
                }
                document.getElementById('f-format').value = res.format || '33T';
                
                this.lastSelectedMetadata = res;
                this.closeModal('fiche-modal');
                alert("Formulaire complété !");
            },

            searchDiscogsPrompt() {
                const query = prompt("Rechercher un album par texte (ex: Dark Side of the Moon) :");
                if(query) {
                    this.searchDiscogsPromptWithText(query);
                }
            },

            async searchDiscogsPromptWithText(query) {
                if (!query) return;
                alert("Recherche lancée pour : " + query);
                let results = [];

                if (this.DISCOGS_TOKEN && this.DISCOGS_TOKEN !== "VOTRE_TOKEN_DISCOGS_ICI") {
                    try {
                        const res = await fetch(`https://api.discogs.com/database/search?q=${encodeURIComponent(query)}&type=release&token=${this.DISCOGS_TOKEN}`);
                        const data = await res.json();
                        if (data.results && data.results.length > 0) {
                            data.results.slice(0, 10).forEach(m => {
                                const parts = m.title.split(' - ');
                                results.push({
                                    title: parts[1] || m.title, artist: parts[0] || '', year: m.year || '', image: m.cover_image || '',
                                    genre: m.genre ? m.genre[0] : 'Autre', format: (m.format && (m.format.includes('LP') || m.format.includes('33'))) ? '33T' : '45T',
                                    label: m.label || [], country: m.country || '', notes: `Recherche textuelle.`
                                });
                            });
                        }
                    } catch(e) {}
                }

                try {
                    const mbRes = await fetch(`https://musicbrainz.org/ws/2/release/?query=release:${encodeURIComponent(query)}&fmt=json`);
                    const mbData = await mbRes.json();
                    if (mbData.releases && mbData.releases.length > 0) {
                        mbData.releases.slice(0, 10).forEach(m => {
                            results.push({
                                title: m.title, artist: m['artist-credit'] ? m['artist-credit'][0].name : '', year: m.date ? m.date.split('-')[0] : '',
                                image: `https://coverartarchive.org/release/${m.id}/front`, genre: 'Autre', format: '33T',
                                label: m['label-info'] ? m['label-info'].map(l => l.label ? l.label.name : '') : [], country: m.country || '', notes: `Recherche textuelle (MusicBrainz).`
                            });
                        });
                    }
                } catch(e) {}

                if (results.length > 0) {
                    this.pendingResults = results;
                    this.showEditionSelection();
                } else {
                    alert("Aucun album trouvé pour cette recherche.");
                }
            },

            // --- AFFICHAGE ACCUEIL ---
            renderHome() {
                const owned = this.data.filter(v => !v.isWishlist);
                const container = document.getElementById('hero-container');
                const summary = document.getElementById('dash-summary');

                const totalInvested = owned.reduce((sum, v) => sum + (parseFloat(v.price) || 0), 0);
                
                summary.innerHTML = `
                    <div class="stat-card"><h3>Vinyles</h3><p>${owned.length}</p></div>
                    <div class="stat-card"><h3>Artistes</h3><p>${new Set(owned.map(v=>v.artist)).size}</p></div>
                    <div class="stat-card"><h3>Valeur</h3><p style="color: #4caf50;">${totalInvested.toFixed(2)}€</p></div>
                `;

                if (owned.length === 0) {
                    container.innerHTML = `<div class="hero-vinyl" style="justify-content:center"><h2 style="color:var(--text-muted)">Collection vide. Ajoutez des disques !</h2></div>`;
                    return;
                }

                const last = owned[owned.length - 1];
                container.innerHTML = `
                    <div class="hero-vinyl">
                        <div class="cover-wrapper">
                            <img src="${last.image || 'https://via.placeholder.com/300x300?text=Vinyle'}" class="hero-cover">
                        </div>
                        <div class="hero-info">
                            <h2 style="color: var(--accent); font-size: 0.9rem; text-transform: uppercase;">Dernier ajout</h2>
                            <h1>${last.title}</h1>
                            <h3 style="color: var(--text-muted);">${last.artist}</h3>
                        </div>
                    </div>
                `;
            },

            // --- GRILLES ---
            renderGrid(type) {
                const grid = document.getElementById(type === 'wishlist' ? 'wishlist-grid' : 'collection-grid');
                let items = this.data.filter(v => type === 'wishlist' ? v.isWishlist : !v.isWishlist);

                if (type === 'collection') {
                    const search = document.getElementById('search-input').value.toLowerCase();
                    const genre = document.getElementById('filter-genre').value;
                    const sort = document.getElementById('sort-by').value;

                    items = items.filter(v => {
                        return (v.title.toLowerCase().includes(search) || v.artist.toLowerCase().includes(search)) 
                            && (genre === 'all' || v.genre === genre) 
                            && (!this.showOnlyFavorites || v.favorite);
                    });

                    items.sort((a, b) => sort === 'artist' ? a.artist.localeCompare(b.artist) : sort === 'year' ? (b.year || 0) - (a.year || 0) : b.id - a.id);
                }

                if(items.length === 0) {
                    grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--text-muted);">Aucun disque trouvé.</div>`;
                    return;
                }

                grid.innerHTML = items.map(v => `
                    <div class="vinyl-card" onclick="app.openFiche(${v.id})">
                        ${v.favorite ? '<div class="badge-fav">★</div>' : ''}
                        <img src="${v.image || 'https://via.placeholder.com/300x300?text=Vinyle'}">
                        <div class="card-content">
                            <div style="font-weight: bold; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${v.title}</div>
                            <div style="color: var(--accent); font-size: 0.85rem;">${v.artist}</div>
                        </div>
                    </div>
                `).join('');
            },

            // --- AJOUTS ---
            previewImage(input, previewId) {
                if (input.files && input.files[0]) {
                    const file = input.files[0];
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        document.getElementById(previewId).src = e.target.result;
                        document.getElementById(previewId).style.display = 'block';
                        
                        const cleanName = file.name.replace(/\.[^/.]+$/, "").replace(/[-_]/g, " ");
                        if(cleanName !== "image" && confirm("Solution alternative : Souhaitez-vous lancer une recherche automatisée à partir du nom du fichier de l'image ?")) {
                            this.searchDiscogsPromptWithText(cleanName);
                        }
                    }
                    reader.readAsDataURL(input.files[0]);
                }
            },

            addVinyl(e) {
                e.preventDefault();
                const title = document.getElementById('f-title').value;
                const artist = document.getElementById('f-artist').value;
                const year = document.getElementById('f-year').value;
                const genre = document.getElementById('f-genre').value;
                const format = document.getElementById('f-format').value;
                const color = document.getElementById('f-color').value;
                const price = document.getElementById('f-price').value;
                let imageSrc = document.getElementById('f-image-url').value || document.getElementById('f-preview').src;

                const isDuplicate = this.data.filter(v => !v.isWishlist).some(v => 
                    v.title.toLowerCase().trim() === title.toLowerCase().trim() && 
                    v.artist.toLowerCase().trim() === artist.toLowerCase().trim()
                );

                if (isDuplicate && !confirm(`Un vinyle identique ("${title}" - ${artist}) existe déjà. Souhaitez-vous tout de même l'ajouter ?`)) {
                    return;
                }

                if (!confirm(`Confirmer l'ajout de "${title}" à votre collection ?`)) return;

                let extraNotes = this.lastSelectedMetadata ? this.lastSelectedMetadata.notes : '';

                this.data.push({
                    id: Date.now(), title: title, artist: artist, year: year, genre: genre,
                    image: imageSrc, format: format, color: color, price: price, isWishlist: false, 
                    favorite: false, rating: 0, notes: extraNotes, loan: { isLoaned: false }, barcode: this.currentBarcode || ''
                });

                this.saveData(); e.target.reset(); document.getElementById('f-preview').style.display = 'none';
                this.currentBarcode = ''; this.lastSelectedMetadata = null; alert("Ajouté !");
            },

            addWishlist(e) {
                e.preventDefault();
                this.data.push({
                    id: Date.now(), title: document.getElementById('w-title').value, artist: document.getElementById('w-artist').value,
                    price: document.getElementById('w-price').value, image: document.getElementById('w-image-url').value, storeLink: document.getElementById('w-store').value,
                    isWishlist: true, favorite: false, rating: 0
                });
                this.saveData(); e.target.reset(); alert("Ajouté à la wishlist !");
            },

            // --- FICHE DÉTAILLÉE ---
            openFiche(id) {
                const v = this.data.find(x => x.id === id);
                if(!v) return;

                let stars = '';
                for(let i=1; i<=5; i++) stars += `<span class="star ${i <= v.rating ? 'active' : ''}" onclick="app.setRating(${id}, ${i})">★</span>`;

                document.getElementById('fiche-content').innerHTML = `
                    <button class="modal-close" onclick="app.closeModal('fiche-modal')">✕</button>
                    <div style="display: flex; flex-direction: column; gap: 1rem; align-items: center;">
                        <img src="${v.image || 'https://via.placeholder.com/300'}" style="width: 100%; max-width: 250px; border-radius: 8px;">
                        
                        <div style="width: 100%;">
                            <h2 style="font-size: 1.5rem; line-height: 1.1; margin-bottom: 5px;">${v.title}</h2>
                            <h3 style="color: var(--accent); margin-bottom: 15px;">${v.artist}</h3>
                            
                            ${!v.isWishlist ? `<div class="star-rating" style="margin-bottom: 15px;">${stars}</div>` : ''}
                            
                            <div style="background: var(--bg-lighter); padding: 15px; border-radius: 8px; font-size: 0.9rem; line-height: 1.8;">
                                ${!v.isWishlist ? `
                                    <div><b>Année:</b> ${v.year || '-'} | <b>Genre:</b> ${v.genre || '-'}</div>
                                    <div><b>Format:</b> ${v.format || '-'} | <b>Couleur:</b> ${v.color || '-'}</div>
                                    <div><b>Prix:</b> ${v.price ? v.price+'€' : '-'}</div>
                                ` : `
                                    <div><b>Prix espéré:</b> ${v.price ? v.price+'€' : '-'}</div>
                                    <div><b>Boutique:</b> ${v.storeLink || '-'}</div>
                                `}
                            </div>

                            <textarea style="margin-top: 15px;" rows="3" placeholder="Notes (ex: Anecdote, état...)" onchange="app.updateNote(${id}, this.value)">${v.notes || ''}</textarea>
                            
                            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
                                <button class="btn btn-outline" onclick="app.toggleFav(${id})">${v.favorite ? 'Retirer des favoris' : '⭐ Mettre en favori'}</button>
                                ${v.isWishlist ? `<button class="btn btn-primary" onclick="app.moveToCollection(${id})">Transférer dans la collection</button>` : ''}
                                <button class="btn" style="background: var(--danger); color: white;" onclick="app.askDelete(${id})">Supprimer l'album</button>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('fiche-modal').classList.add('active');
            },

            setRating(id, note) { const v = this.data.find(x=>x.id===id); if(v){ v.rating = note; this.saveData(); this.openFiche(id); } },
            toggleFav(id) { const v = this.data.find(x=>x.id===id); if(v){ v.favorite = !v.favorite; this.saveData(); this.openFiche(id); } },
            moveToCollection(id) { const v = this.data.find(x=>x.id===id); if(v){ v.isWishlist = false; this.saveData(); this.closeModal('fiche-modal'); this.switchTab('collection'); } },
            updateNote(id, text) { const v = this.data.find(x=>x.id===id); if(v){ v.notes = text; this.saveData(); } },

            askDelete(id) {
                document.getElementById('confirm-msg').innerText = "Voulez-vous supprimer cet album ?";
                document.getElementById('confirm-modal').classList.add('active');
                this.confirmCallback = () => {
                    this.data = this.data.filter(x => x.id !== id);
                    this.saveData();
                    this.closeModal('fiche-modal');
                };
            },
            resolveConfirm(res) {
                document.getElementById('confirm-modal').classList.remove('active');
                if(res && this.confirmCallback) this.confirmCallback();
                this.confirmCallback = null;
            },

            // --- FILTRES ET STATS ---
            updateFilters() {
                const genres = [...new Set(this.data.map(v => v.genre))].filter(Boolean);
                document.getElementById('filter-genre').innerHTML = '<option value="all">Tous les genres</option>' + genres.map(g => `<option value="${g}">${g}</option>`).join('');
            },
            toggleFavoritesFilter() {
                this.showOnlyFavorites = !this.showOnlyFavorites;
                const btn = document.getElementById('btn-fav-filter');
                btn.style.background = this.showOnlyFavorites ? 'var(--accent)' : 'transparent';
                btn.style.color = this.showOnlyFavorites ? '#000' : 'var(--accent)';
                this.renderGrid('collection');
            },
            exportCSV() {
                if(this.data.length === 0) return alert("Collection vide");
                const headers = "Titre,Artiste,Année,Genre,Prix\n";
                const rows = this.data.map(v => `"${v.title}","${v.artist}","${v.year||''}","${v.genre||''}","${v.price||''}"`).join("\n");
                const blob = new Blob([headers + rows], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "export_vinyles.csv"; link.click();
            },

            renderStats() {
                const owned = this.data.filter(v => !v.isWishlist);
                if(owned.length === 0) return;
                const genres = {}; owned.forEach(v => { if(v.genre) genres[v.genre] = (genres[v.genre] || 0) + 1; });
                const decades = {}; owned.forEach(v => { if(v.year) { const dec = Math.floor(v.year / 10) * 10; decades[`${dec}s`] = (decades[`${dec}s`] || 0) + 1; } });
                this.drawChart('genreChart', 'pie', 'Genres', Object.keys(genres), Object.values(genres));
                this.drawChart('decadeChart', 'bar', 'Décennies', Object.keys(decades).sort(), Object.keys(decades).sort().map(k => decades[k]));
            },
            drawChart(canvasId, type, label, labels, data) {
                if(this.charts[canvasId]) this.charts[canvasId].destroy();
                const ctx = document.getElementById(canvasId).getContext('2d');
                this.charts[canvasId] = new Chart(ctx, {
                    type: type, data: { labels: labels, datasets: [{ label: label, data: data, backgroundColor: ['#d4af37', '#ef5466', '#1DB954', '#555', '#a0a0a0'] }] },
                    options: { responsive: true, plugins: { legend: { labels: { color: '#fff' } } } }
                });
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
